agent = "copilot"
backup_agent = "claude-code"
review_reasoning = "thorough"

excluded_branches = ["main"]

review_guidelines = '''
Dotfiles repo: cross-platform shell config, Homebrew, mise, tmux, git config. The global Claude Code config (rules, skills, hooks) lives in the companion private repo and is NOT in this tree.

HARD INVARIANTS — flag violations as blockers:

1. Secrets: never commit credentials, tokens, API keys, or secrets. This repo is public on GitHub.
2. Personal/sensitive content: never include PII, employer name, colleague names, broker/financial figures, internal product/project names, or memory-file references that hint at sensitive content. Examples and placeholders count. This repo is public.
3. Shell compatibility: Claude Code's Bash tool passes through zsh, which corrupts `!` to `\!` in file content. Files must not contain `\!` — flag any occurrence as corruption.
4. Cross-platform: any shell, tmux, or tool config change must consider macOS, Linux, and WSL2. Guard platform-specific code with `$PLATFORM` checks. Brewfile edits must be mirrored in `Brewfile.linux` for CLI tools.
5. Project-local rule (`.claude/rules/brewfile.md`): dual-Brewfile sync + alphabetical sorting inside sections.

SCOPE CONTEXT — understand before flagging:

- rcup symlinks: tracked files are symlinked into $HOME by rcm based on `rcrc`. Both this repo and `dotfiles-private` are merged via `DOTFILES_DIRS`.
- Versioning: SemVer policy and release procedure documented in the global `versioning.md` rule (loaded from `~/.claude/rules/`).
- CI: `just ci` runs shell, markdown, Brewfile, and mise lints — the same checks run in GitHub Actions.

DO NOT FLAG:

- Shell scripts using `jq` for JSON parsing — `jq` is expected to be available on macOS/Linux
- Brewfile lines that look long — keep them as written, alphabetically sorted within their section
'''
